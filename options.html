<!DOCTYPE html>
<html>
<head>
  <title>HN Mark All Read Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; width: 350px; }
    h2 { font-size: 1.2rem; margin-top: 0; }
    .description { font-size: 0.9rem; color: #666; margin-bottom: 20px; line-height: 1.4; }
    .sync-option { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
    input[type="checkbox"] { margin-top: 4px; }
    .status { font-size: 0.85rem; color: green; display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Settings</h2>
  <p class="description">
    Hacker News: Mark All Read stores your data locally by default. You can enable <strong>Synchronization</strong> to share your HN read status across all computers where you're signed into Chrome.
  </p>
  <div class="sync-option">
    <input type="checkbox" id="sync-enabled">
    <label for="sync-enabled">
      <strong>Enable Cloud Sync</strong><br>
      <span style="font-size: 0.8rem; color: #777;">
        Uses your Google Profile to securely sync data. Your information is never shared with anyone.
      </span>
    </label>
  </div>
  <div id="status" class="status">Settings saved!</div>
  <script src="options.js"></script>
</body>
</html>
